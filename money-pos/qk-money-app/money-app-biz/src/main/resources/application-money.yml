money:
  web:
    # 全局响应处理器
    response-handler: true
    # 全局异常处理器
    exception-handler: true
    # 全局请求日志切面
    web-log-aspect:
      enabled: true
      mode: ignore_get_result
      # 脱敏字段列表
      desensitize-fields:
        - password
        - oldPassword
        - newPassword
        - token
        - secret
        - accessToken
        - refreshToken
    # 多语言
    i18n:
      enabled: true
      support:
        - en
    # 多时区
    timezone:
      enabled: true
      default-time-zone: GMT+08:00
  # 多租户
  tenant:
    # 开关
    enabled: true
    # 请求头
    header: Y-tenant
    # 默认租户id
    default-tenant-id: "0"
    # 忽略的表
    ignore-table:
      - sys_tenant
      - sys_dict
      - sys_dict_detail
      - provinces
  # 缓存
  cache:
    # 本地缓存
    local:
      # 提供者 hutool（默认）、caffeine
      provider: hutool
      # hutool-cache参数
      hutool:
        # 失效策略：LRU（默认）、LFU、FIFO、TIMED、WEAK
        strategy: LRU
        # 容量
        capacity: 102400
        # 过期时间：ms，0 代表永不过期
        ttl: 86400000
    # redis 缓存
    redis:
      # 开关，默认关闭
      enabled: false
      # 过期时间：ms，主要用于@Cacheable相关注解的过期时间
      ttl: 86400000
  # 安全
  security:
    # Token 配置
    token:
      # Token 请求头键名
      header: Authorization
      # 令牌类型：完整 Token："{tokenType} {accessToken}"
      token-type: Bearer
      # 密钥
      secret: money
      # Access Token 过期时间（ms），默认8小时
      ttl: 2592000000
      # Refresh Token 过期时间（ms），默认30天
      refresh-ttl: 2592000000
      # 策略：jwt（自动过期，默认）、redis
      strategy: jwt
      # 缓存键名前缀
      cache-key: "security:token:"
    # 忽略的 URL
    ignore:
      get:
        - /tenants/byCode
        - /auth/refreshToken
      post:
        - /auth/login
        - /auth/logout
      pattern:
        - /error/**
        - /actuator/**
        - /swagger**/**
        - /webjars/**
        - /v3/**
        - /assets/**
  # 邮件服务
  # 邮件服务
  mail:
    # 邮箱服务器
    host: smtp.qq.com
    # 账号（QQ邮箱账号）
    username: your-qq-email@qq.com
    # 授权码（非QQ密码，需在QQ邮箱设置中开启SMTP服务后获取）
    password: your-authorization-code
    properties:
      mail:
        smtp:
          auth: true
          # 使用SSL安全协议
          ssl:
            enable: true
    port: 465  # 端口
    protocol: smtps # 协议
    default-encoding: utf-8
    fromAlias: 麦尼 # 发件人别名
  # 对象存储
  oss:
    local:
      # 目标空间
      bucket: F:/qk-money/
      # 资源处理器
      resource-handler: /assets/**
    qiniu:
      # 访问密钥
      access-key:
      # 秘密密钥
      secret-key:
      # 是否使用 https
      use-https: false
      # 访问域名
      domain: r3xou9o36.hn-bkt.clouddn.com
      # 目标空间
      bucket: qk-money
      # 令牌过期时间
      token-expire: 3600
      # 上传策略 https://developer.qiniu.com/kodo/1206/put-policy
      policy:
        return-body: '{"key":"$(key)","hash":"$(etag)","fname":"$(x:fname)","age":"$(x:age)"}'